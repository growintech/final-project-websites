<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <title>HobbyLoop</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">

  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>

<!-- NAVBAR -->
<header class="navbar">
  <h1>HobbyLoop</h1>
  <nav>
    <button onclick="scrollToSection('arte')">Arte</button>
    <button onclick="scrollToSection('cucina')">Cucina</button>
    <button onclick="scrollToSection('fitness')">Fitness</button>
    <button onclick="scrollToSection('musica')">Musica</button>
  </nav>
</header>

<!-- HERO -->
<section class="hero">
  <div class="hero-text">
    <h2>Impara nuovi hobby<br>in modo semplice</h2>
    <p>Video selezionati per iniziare subito, senza stress</p>
    <button onclick="scrollToSection('arte')">Inizia ora</button>
  </div>
</section>

<!-- CONTENUTO -->
<main>

<section id="arte" class="section">
  <h2>🎨 Arte</h2>
  <div class="grid">
    <div class="card">
      <iframe src="https://www.youtube.com/embed/ewMksAbgdBI"></iframe>
      <p>Disegno a matita</p>
    </div>
    <div class="card">
      <iframe src="https://www.youtube.com/embed/kN1xp-Bef7w"></iframe>
      <p>Pittura acrilica</p>
    </div>
  </div>
</section>

<section id="cucina" class="section">
  <h2>🍳 Cucina</h2>
  <div class="grid">
    <div class="card">
      <iframe src="https://www.youtube.com/embed/1-SJGQ2HLp8"></iframe>
      <p>Pasta facile</p>
    </div>
    <div class="card">
      <iframe src="https://www.youtube.com/embed/3AAdKl1UYZs"></iframe>
      <p>Dessert veloce</p>
    </div>
  </div>
</section>

<section id="fitness" class="section">
  <h2>💪 Fitness</h2>
  <div class="grid">
    <div class="card">
      <iframe src="https://www.youtube.com/embed/UItWltVZZmE"></iframe>
      <p>Workout base</p>
    </div>
    <div class="card">
      <iframe src="https://www.youtube.com/embed/v7AYKMP6rOE"></iframe>
      <p>Yoga rilassante</p>
    </div>
  </div>
</section>

<section id="musica" class="section">
  <h2>🎵 Musica</h2>
  <div class="grid">
    <div class="card">
      <iframe src="https://www.youtube.com/embed/2pOTq4N9uM0"></iframe>
      <p>Chitarra base</p>
    </div>
    <div class="card">
      <iframe src="https://www.youtube.com/embed/827jmswqnEA"></iframe>
      <p>Pianoforte</p>
    </div>
  </div>
</section>

</main>

<footer>
  <p>© 2026 HobbyLoop</p>
</footer>

<script src="script.js"></script>
</body>
</html>

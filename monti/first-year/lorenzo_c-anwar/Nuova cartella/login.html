<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login & Contact - AM STREAMING</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar">
        <div class="logo">AM STREAMING</div>
        <div class="nav-links"><a href="index.html">Home</a></div>
    </nav>

    <main class="login-container">
        <section class="form-box">
            <h2>Login</h2>
            <input type="text" placeholder="Username">
            <input type="password" placeholder="Password">
            <button class="btn-submit">Login</button>
        </section>

        <section class="form-box">
            <h2>Contact Us</h2>
            <input type="text" placeholder="Name">
            <input type="email" placeholder="Email">
            <textarea placeholder="Your message..." rows="4"></textarea>
            <button class="btn-submit">Send Message</button>
        </section>
    </main>
    
    <footer class="social-footer">
        <div class="disclaimer-container">
            <p class="disclaimer-text">
                AM STREAMING does not claim ownership of any copyrighted material. All content is provided by third-party sources.
            </p>
        </div>
        <div class="footer-links-container">
            <p>Follow us on:</p>
            <a href="#"><img src="https://cdn-icons-png.flaticon.com/512/174/174855.png" alt="IG" class="social-icon"></a>
            <a href="#"><img src="https://cdn-icons-png.flaticon.com/512/733/733547.png" alt="FB" class="social-icon"></a>
            <a href="#"><img src="https://cdn-icons-png.flaticon.com/512/3256/3256013.png" alt="X" class="social-icon"></a>
        </div>
    </footer>
</body>
</html>
